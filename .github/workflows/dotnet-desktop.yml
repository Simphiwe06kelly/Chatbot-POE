name: .NET Build & Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build in Release configuration
        run: dotnet build --no-restore --configuration Release

      - name: Verify build output exists
        shell: pwsh
        run: |
          $exes = Get-ChildItem -Recurse -Filter "*.exe" -Path "." |
                  Where-Object { $_.FullName -like "*Release*" }
          if ($exes.Count -gt 0) {
            Write-Host "Build artifact verified:"
            $exes | ForEach-Object { Write-Host "  $($_.FullName)" }
          } else {
            Write-Error "No Release .exe found. Build may have failed."
            exit 1
          }

      - name: Display build summary
        shell: pwsh
        run: |
          Write-Host "======================================"
          Write-Host " CybersecurityAwarenessBot"
          Write-Host " Build: SUCCESS"
          Write-Host " Config: Release"
          Write-Host " Runner: windows-latest"
          Write-Host "======================================"
